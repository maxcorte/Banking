spring:
  application:
    name: banking-server

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banking}
    username: ${DB_USER:banking}
    password: ${DB_PASSWORD:banking}

  jpa:
    hibernate:
      # Le schéma est géré par Flyway, pas par Hibernate.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Envoi d'e-mails (reinitialisation de mot de passe). Renseigner via les
  # variables MAIL_* en production. Sans configuration, l'app demarre quand
  # meme et le lien est journalise au lieu d'etre envoye (pratique en dev).
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          # Port 465 = SSL direct (cas Hostinger). Port 587 = STARTTLS (ex. Brevo).
          # On pilote les deux par variables d'environnement.
          ssl:
            enable: ${MAIL_SSL:true}
          starttls:
            enable: ${MAIL_STARTTLS:false}

server:
  port: 8080

# Securite JWT. En production, fournir le secret via la variable
# d'environnement JWT_SECRET (au moins 32 caracteres).
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-32chars-minimum-0123456789}
    # Jeton d'acces court (15 min) + refresh token long (7 jours).
    access-expiration-ms: ${JWT_ACCESS_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}
  admin:
    # Compte administrateur cree au demarrage (voit tous les comptes).
    # A changer en production via ADMIN_USERNAME / ADMIN_PASSWORD.
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin1234}
  security:
    # Mettre a true en deploiement : le demarrage echoue si les secrets
    # (JWT / mot de passe admin) sont restes aux valeurs par defaut.
    enforce-secrets: ${ENFORCE_SECRETS:false}
  auth:
    # Cookies d'authentification Secure (HTTPS uniquement). En HTTP local
    # pur, mettre COOKIE_SECURE=false. Via Funnel (HTTPS) : laisser true.
    cookie-secure: ${COOKIE_SECURE:true}
  # URL publique de l'app, utilisee pour construire le lien de reinitialisation
  # envoye par e-mail (ex. https://maximedelcorte.cloud).
  base-url: ${APP_BASE_URL:http://localhost:8080}
  mail:
    # Adresse expediteur des e-mails transactionnels.
    from: ${MAIL_FROM:no-reply@localhost}
  reset:
    # Duree de validite d'un lien de reinitialisation (defaut : 30 min).
    expiration-ms: ${RESET_EXPIRATION_MS:1800000}
  vapid:
    # Cles VAPID pour les notifications push web. Vides par defaut : sans elles,
    # le push est simplement desactive et l'app fonctionne normalement.
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:noreply@maximedelcorte.cloud}

spring.mvc.problemdetails.enabled: true

# Endpoints de supervision (santé de l'appli)
management:
  endpoints:
    web:
      exposure:
        include: health,info
